type: marketplace
title: "Python by Building MiniERP: From the Basics to Mastery"
language: English
summary: "A guided project for working developers learning Python. You build MiniERP,\
  \ a small-business ERP suite (inventory, customers, sales & invoicing, payments,\
  \ reporting, users & roles, audit log, import/export) with four front-ends (CLI,\
  \ Web, desktop GUI, text UI), one stage at a time. The course is standard-library-first\
  \ so you understand how Python actually works, then layers in popular open-source\
  \ tools. It targets Python 3.14 and aims to leave no language or standard-library\
  \ feature unexplored."
programming_language: Python
